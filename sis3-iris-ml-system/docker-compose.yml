version: "3.9"

services:
  # -------------------------------------------------------------------------
  # MLflow tracking server + model registry (SQLite backend)
  # -------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.0
    container_name: mlflow-server
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    working_dir: /mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/').read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # FastAPI prediction service
  # -------------------------------------------------------------------------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: iris-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/model.joblib
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Streamlit frontend
  # -------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: iris-frontend
    ports:
      - "8501:8501"
    environment:
      # "api" is the service name above; Docker's internal DNS resolves it
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mlflow_data:
